<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Archit Mishra is a Computer Science & Engineering graduate from UC Santa Cruz building across AI/data systems, enterprise software, and 0-to-1 product ideas."
    />
    <meta name="color-scheme" content="light dark" />
    <title>Archit Mishra | Technical Builder</title>
    <link
      rel="icon"
      type="image/jpeg"
      href="assets/ArchitMishraLinkedInProfilePic2026.jpg"
    />
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem("archit-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
